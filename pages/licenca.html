<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/util.js"></script>
  <script src="../js/licenca.js"></script>
</head>
<body class="lic-body">

<div class="lic-box">
  <div style="text-align:center;margin-bottom:24px">
    <div style="width:64px;height:64px;margin:0 auto 12px;background:linear-gradient(135deg,#4f8ef7,#3a7ae2);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px">🔢</div>
    <div style="font-size:18px;font-weight:900;color:var(--fg)">Verificador Matemático de CPF</div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px">Validação estrutural de dígitos verificadores</div>
  </div>

  <div style="text-align:center;margin-bottom:20px">
    <div style="font-size:13px;color:var(--fg2);line-height:1.6">
      Digite a <strong>chave de ativação</strong> que você recebeu<br>após a compra no Mercado Livre
    </div>
  </div>

  <input id="inpChave" class="lic-input" placeholder="CPFCHK-0000-XXXX-0000" maxlength="22" autofocus onkeypress="if(event.key==='Enter') ativar()">

  <button class="lic-btn" onclick="ativar()">🔓 Ativar Licença</button>

  <div id="avisoOk"></div>
  <div id="avisoErro"></div>

  <div style="text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);line-height:1.6">
    Desenvolvido por <strong style="color:var(--primary)">GHZ Plugin</strong><br>
    Suporte: ghzplugin@gmail.com
  </div>
</div>

<script>
aplicarTemaAtual()

function ativar() {
  const key = document.getElementById('inpChave').value.trim()
  if (!key) return aviso('erro', 'Digite a chave de ativação')
  if (!validarChaveCC(key)) return aviso('erro', 'Chave inválida! Verifique e tente novamente.')
  salvarLicencaCC(key)
  aviso('ok', '✅ Licença ativada com sucesso!')
  setTimeout(() => { window.location.replace('../index.html') }, 1000)
}

document.getElementById('inpChave').addEventListener('input', function() {
  this.value = this.value.toUpperCase()
})
</script>
</body>
</html>
